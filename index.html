<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Mon Planning</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">

<!-- iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f8;
    --text2: #8888aa;
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --yellow: #fbbf24;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 40px rgba(124,106,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    font-size: 15px;
  }

  button { font-family: 'Sora', sans-serif; cursor: pointer; }
  input { font-family: 'Sora', sans-serif; }

  /* ─── BACKGROUND ORBS ─── */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); opacity: 0.12;
    pointer-events: none; z-index: 0;
  }
  .orb1 { width: 300px; height: 300px; background: var(--accent); top: -100px; right: -80px; }
  .orb2 { width: 200px; height: 200px; background: var(--cyan); bottom: 100px; left: -60px; }
  .orb3 { width: 150px; height: 150px; background: var(--pink); top: 40%; right: -40px; }

  /* ─── UPDATE BANNER ─── */
  #update-banner {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
    background: var(--bg3); color: var(--text);
    border-top: 1px solid var(--border2);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    flex-direction: column; gap: 8px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
  }
  #update-banner.show { display: flex; }
  #update-banner p { font-size: 13px; font-weight: 600; }
  #update-banner .ubtns { display: flex; gap: 8px; }
  #update-banner button {
    font-size: 12px; font-weight: 600; padding: 8px 18px;
    border-radius: var(--radius-sm); border: none; cursor: pointer;
  }
  .ubtn-ok { background: var(--accent); color: white; box-shadow: 0 4px 16px rgba(124,106,255,0.35); }
  .ubtn-later { background: var(--surface2); color: var(--text2); border: 1px solid var(--border) !important; }

  /* ─── HEADER ─── */
  .hdr {
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    padding: calc(env(safe-area-inset-top) + 14px) 20px 0;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
  .hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .hdr-sub { font-size: 11px; color: var(--text2); margin-top: 5px; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }

  /* ─── NAV TABS ─── */
  .nav-tabs { display: flex; gap: 4px; }
  .ntab {
    flex: 1; padding: 10px 8px; text-align: center;
    font-size: 12px; font-weight: 600;
    color: var(--text2); border: none; background: transparent;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    transition: all 0.2s; letter-spacing: 0.1px;
  }
  .ntab.on {
    background: var(--surface2);
    color: var(--accent2);
    border-bottom: 2px solid var(--accent);
  }

  /* ─── VIEWS ─── */
  .view { display: none; padding: 16px 16px 140px; max-width: 580px; margin: 0 auto; position: relative; z-index: 1; }
  .view.on { display: block; }

  /* ─── STATS GRID ─── */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px; position: relative; overflow: hidden;
    backdrop-filter: blur(16px);
  }
  .scard::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .slbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; font-weight: 600; }
  .snum { font-size: 28px; font-weight: 800; line-height: 1; font-family: 'JetBrains Mono', monospace; }
  .snote { font-size: 11px; margin-top: 4px; font-weight: 500; }

  /* ─── WEEKLY TRACKER PILLS SECTION ─── */
  .psec { margin-bottom: 12px; }
  .ptitle { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; font-weight: 600; }
  .pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill {
    font-size: 11px; padding: 4px 12px; border-radius: 99px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text2); font-weight: 500;
  }

  /* ─── DAY NAV ─── */
  .daynav {
    display: flex; gap: 6px; margin-bottom: 14px;
    overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;
  }
  .daynav::-webkit-scrollbar { display: none; }
  .daybtn {
    flex: 1; min-width: 48px; border-radius: 14px;
    padding: 10px 4px; display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    border: 1px solid var(--border); background: var(--surface);
    transition: all 0.2s; color: var(--text);
    backdrop-filter: blur(10px);
  }
  .daybtn.on { border-color: var(--accent); background: rgba(124,106,255,0.12); }
  .daybtn:active { transform: scale(0.94); }
  .dname { font-size: 10px; font-weight: 600; color: var(--text2); }
  .daybtn.on .dname { color: var(--accent2); font-weight: 700; }
  .daybtn.tod .dname { text-decoration: underline; }
  .ddot {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
    background: var(--surface2); color: var(--text2);
  }

  /* ─── DAY PROGRESS ─── */
  .prow { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .ptxt { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .ppct { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .ptrack { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .pfill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  /* ─── TASK LIST ─── */
  .tasklist { display: flex; flex-direction: column; gap: 10px; }

  /* ─── TASK CARD ─── */
  .tcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.2s;
    position: relative;
    backdrop-filter: blur(16px);
    user-select: none; -webkit-user-select: none;
  }
  .tcard::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .tcard:active { transform: scale(0.99); }
  .tmain { padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
  .tcheck {
    width: 22px; height: 22px; border-radius: 8px;
    border: 1.5px solid var(--border2); background: transparent;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: transparent; transition: all 0.2s; margin-top: 1px;
  }
  .tinfo { flex: 1; min-width: 0; }
  .tname { font-size: 14px; font-weight: 600; color: var(--text); }
  .tsub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .tbadge { font-size: 10px; padding: 3px 9px; border-radius: 99px; font-weight: 700; flex-shrink: 0; align-self: flex-start; }

  /* ─── TASK SECTION (timer area) ─── */
  .tsec { padding: 0 16px 14px 16px; }
  .telapsed { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; font-family: 'JetBrains Mono', monospace; }
  .ttotal { font-size: 12px; color: var(--text2); font-weight: 400; margin-left: 4px; font-family: 'JetBrains Mono', monospace; }
  .tremain { font-size: 10px; color: var(--text2); margin: 3px 0 7px; }
  .tminibar { height: 4px; border-radius: 99px; background: var(--surface2); overflow: hidden; margin-bottom: 10px; }
  .tminibar-fill { height: 100%; border-radius: 99px; transition: width 0.8s; }
  .tbtns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-go {
    font-size: 16px; font-weight: 600; padding: 9px 18px;
    border-radius: 99px; border: none;
    background: var(--accent); color: white;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 16px rgba(124,106,255,0.3);
    min-width: 44px; justify-content: center;
  }
  .btn-go:active { transform: scale(0.94); box-shadow: 0 2px 8px rgba(124,106,255,0.2); }
  .btn-go.resume { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); box-shadow: none; font-size: 16px; }
  .btn-stop {
    font-size: 16px; font-weight: 600; padding: 9px 16px;
    border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2);
    transition: all 0.2s; min-width: 44px; display: flex; align-items: center; justify-content: center;
  }
  .btn-stop:active { transform: scale(0.94); }
  .tts { font-size: 10px; color: var(--text2); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .rdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); display: inline-block;
    animation: pulse 1.2s infinite; flex-shrink: 0;
  }

  /* ─── CHIPS (choices) ─── */
  .choices-wrap { padding: 0 16px 14px 16px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    font-size: 12px; padding: 7px 14px; border-radius: 99px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all 0.2s; font-weight: 500;
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .chip:active { transform: scale(0.95); }
  .chip-timer { font-size: 10px; font-variant-numeric: tabular-nums; opacity: 0.8; font-family: 'JetBrains Mono', monospace; }

  .subtimer {
    background: var(--bg3); border-radius: var(--radius-sm);
    padding: 12px 14px; margin-top: 8px;
    border: 1px solid var(--border);
  }
  .stlbl {
    font-size: 11px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .add-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .add-row::-webkit-scrollbar { display: none; }
  .add-inp {
    flex-shrink: 0;
    font-size: 12px; padding: 8px 14px;
    border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    flex: 1; max-width: 180px; outline: none;
    transition: border-color 0.2s;
  }
  .add-inp:focus { border-color: var(--accent); }
  .btn-add {
    font-size: 12px; padding: 8px 14px; border-radius: 99px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-weight: 600; transition: all 0.2s;
    flex-shrink: 0; white-space: nowrap;
  }
  .btn-add:active { transform: scale(0.94); }

  /* ─── ALERT ─── */
  .alert {
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 12px; margin-top: 10px; font-weight: 500;
    border: 1px solid var(--border);
  }

  /* ─── RAPPORT VIEW ─── */
  .rsec { margin-bottom: 22px; }
  .rtitle {
    font-size: 13px; font-weight: 700; margin-bottom: 10px;
    letter-spacing: -0.2px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .rcont {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; backdrop-filter: blur(16px);
    position: relative; overflow: hidden;
  }
  .rcont::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  canvas { display: block; width: 100%; }

  /* ─── TABLE ─── */
  .wtable { width: 100%; border-collapse: collapse; font-size: 11px; }
  .wtable th {
    text-align: left; padding: 7px 8px;
    color: var(--text2); font-weight: 700;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .wtable td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .wtable tr:last-child td { border-bottom: none; }
  .tdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .dcell { text-align: center; }
  .cdone {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; margin: 0 auto;
    background: var(--surface2); color: var(--text2);
  }

  /* ─── INSIGHTS GRID ─── */
  .sgrid { display: flex; flex-direction: column; gap: 10px; }
  .scard2 {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; backdrop-filter: blur(16px);
  }
  .stitle2 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; color: var(--text2); }
  .sitem { font-size: 12px; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
  .sbar-wrap { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 99px; }
  .spct { font-size: 11px; font-weight: 700; min-width: 32px; text-align: right; font-family: 'JetBrains Mono', monospace; }
  .sname { font-size: 11px; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }

  /* ─── MOTIVATIONAL TITLE ─── */
  #motiv-title {
    font-size: 14px; font-weight: 600; color: var(--text2);
    line-height: 1.5; margin-bottom: 14px; letter-spacing: -0.2px;
    padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); backdrop-filter: blur(10px);
  }

  /* ─── EDIT MODAL ─── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.6); backdrop-filter:blur(6px);
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show { display:flex; }
  .modal-box {
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:24px; width:100%; max-width:380px;
    box-shadow:var(--shadow); max-height:85vh; overflow-y:auto;
  }
  .modal-title { font-size:15px; font-weight:700; margin-bottom:16px; color:var(--text); }
  .modal-inp {
    width:100%; font-size:14px; padding:10px 14px;
    border-radius:var(--radius-sm); border:1px solid var(--border2);
    background:var(--surface); color:var(--text);
    outline:none; font-family:'Sora',sans-serif;
    transition:border-color 0.2s;
  }
  .modal-inp:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:8px; margin-top:14px; }
  .mbtn-ok {
    flex:1; font-size:13px; font-weight:700; padding:10px 16px;
    border-radius:99px; border:none; background:var(--accent); color:#fff;
    box-shadow:0 4px 16px rgba(124,106,255,0.3); cursor:pointer;
  }
  .mbtn-cancel {
    font-size:13px; font-weight:600; padding:10px 16px;
    border-radius:99px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text2); cursor:pointer;
  }
  .mbtn-del {
    font-size:13px; font-weight:600; padding:10px 16px;
    border-radius:99px; border:1px solid rgba(248,113,113,0.3);
    background:rgba(248,113,113,0.1); color:var(--red); cursor:pointer;
  }

  /* ─── TASK EDIT TOOLBAR ─── */
  .task-edit-bar {
    display:flex; align-items:center; gap:6px;
    padding:4px 16px 8px 16px; flex-wrap:wrap;
  }
  .teb-btn {
    font-size:11px; font-weight:600; padding:5px 12px;
    border-radius:99px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text2);
    cursor:pointer; transition:all 0.15s;
  }
  .teb-btn:active { transform:scale(0.94); }
  .teb-btn.danger { border-color:rgba(248,113,113,0.3); color:var(--red); background:rgba(248,113,113,0.08); }

  /* ─── CHIP EDIT ─── */
  .chip-edit-row {
    display:flex; align-items:center; gap:6px;
    padding:4px 0; border-bottom:1px solid var(--border);
  }
  .chip-edit-row:last-child { border-bottom:none; }
  .chip-edit-lbl { flex:1; font-size:13px; color:var(--text); }
  .chip-del-btn {
    font-size:11px; padding:3px 10px; border-radius:99px;
    border:1px solid rgba(248,113,113,0.3); background:rgba(248,113,113,0.08);
    color:var(--red); cursor:pointer;
  }
  .chip-ren-btn {
    font-size:11px; padding:3px 10px; border-radius:99px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--text2); cursor:pointer;
  }

  /* ─── MANAGE PANEL (sections) ─── */
  .manage-panel {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:14px;
    margin:0 16px 14px 16px;
  }
  .manage-panel-title {
    font-size:10px; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;
  }

  /* ─── TODO LIST ─── */
  .todo-modal {
    display:none; position:fixed; inset:0; z-index:600;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(8px);
    align-items:flex-end; justify-content:center; padding:0;
  }
  .todo-modal.show { display:flex; }
  .todo-sheet {
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:24px 24px 0 0; width:100%; max-width:580px;
    max-height:80vh; display:flex; flex-direction:column;
    box-shadow:0 -8px 40px rgba(0,0,0,0.5);
    animation: slideUp 0.25s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity:0; }
    to   { transform: translateY(0);    opacity:1; }
  }
  .todo-sheet-handle {
    width:40px; height:4px; border-radius:99px;
    background:var(--border2); margin:12px auto 0;
  }
  .todo-sheet-hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px 10px;
  }
  .todo-sheet-title {
    font-size:15px; font-weight:700; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .todo-sheet-close {
    width:30px; height:30px; border-radius:50%;
    border:none; background:var(--surface2); color:var(--text2);
    font-size:16px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }
  .todo-progress-wrap {
    padding:0 18px 10px;
  }
  .todo-progress-bar {
    height:6px; background:var(--surface2); border-radius:99px; overflow:hidden;
  }
  .todo-progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .todo-progress-lbl {
    font-size:10px; color:var(--text2); margin-top:5px;
    display:flex; justify-content:space-between;
  }

  /* ─── TODO PROGRESS ON CARD ─── */

  /* ─── FLOATING BOTTOM NAV ─── */
  #float-nav {

  .fnav-btn:active { transform: scale(0.93); }

<script>
'use strict';
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const ABBR=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
let DEF_MASTER=['Intergiciel','Compilation','Data Mining'];
let DEF_FORM=['CS50','Python','IA','SpringBoot'];

// FocusFlow-compatible color palette (maps old C keys to CSS vars + dark-friendly colors)
const C={
  amber:{bg:'rgba(251,191,36,0.12)',txt:'#fbbf24',bd:'#d97706',mid:'#fbbf24'},
  purple:{bg:'rgba(167,139,250,0.12)',txt:'#a78bfa',bd:'#7c6aff',mid:'#a78bfa'},
  teal:{bg:'rgba(34,211,238,0.12)',txt:'#22d3ee',bd:'#0891b2',mid:'#22d3ee'},
  blue:{bg:'rgba(96,165,250,0.12)',txt:'#60a5fa',bd:'#2563eb',mid:'#60a5fa'},
  coral:{bg:'rgba(251,113,133,0.12)',txt:'#fb7185',bd:'#e11d48',mid:'#fb7185'},
  green:{bg:'rgba(52,211,153,0.12)',txt:'#34d399',bd:'#059669',mid:'#34d399'},
};

const DEF_DUR={
  ang:1800, math:7200, m1:14400, form:14400, lect:900,
  cor:3600, cor1:3600, cor2:3600, islam:1800
};
function getDur(tid){return settings[tid]||DEF_DUR[tid]||3600;}

// ── DEFAULT TASK DEFINITIONS (customizable) ──────────────────────────
const BASE_TASKS=[
  {id:'ang', lbl:'Anglais',            sub:'3 × 30 min · matin, journée, soir', col:'blue',  type:'multi', defCh:['Matin-Duo-Shadowing','Midi-Duo-Podcast','Soir-Duo-Practice-Reading'], subDur:true},
  {id:'math',lbl:'Mathématiques',      sub:'Préparation concours ISSEA',         col:'amber', wmin:3},
  {id:'m1',  lbl:'Cours Master 1',     sub:'Choisir la matière à étudier',       col:'purple',type:'multi', defCh:DEF_MASTER},
  {id:'form',lbl:'Formations tech',    sub:'Choisir la formation à suivre',      col:'teal',  type:'multi', defCh:DEF_FORM},
  {id:'lect',lbl:'Lecture roman',      sub:'Culture générale quotidienne',       col:'coral'},
  {id:'islam',lbl:'Islam',             sub:'Adhkâr & récitation quotidienne',    col:'green', type:'multi', defCh:["Matin-Du'as-Istighfar","Matin-Tajweed-Récitation","Midi-Azkar-Istighfar","Soir-Dua'as-Istighfar-Sourate Mulk"]},
];
const SPECIAL_TASKS=[];

// taskNames: overrides for lbl of any task id
// extraTasks: [{id,lbl,sub,col,type?,defCh?}] — user-added sections
// removedTasks: set of task ids removed by user
// customChoices: {tid:[...]} — added chips
// removedChoices: {tid:[...]} — removed chips
// renamedChoices: {tid:{oldName:newName}} — renamed chips

let taskNames={},extraTasks=[],removedTasks=new Set(),customChoices={},removedChoices={},renamedChoices={};

function loadCustomizations(){
  try{
    const s=localStorage.getItem('plnr_customizations');
    if(s){
      const p=JSON.parse(s);
      taskNames=p.taskNames||{};
      extraTasks=p.extraTasks||[];
      removedTasks=new Set(p.removedTasks||[]);
      customChoices=p.customChoices||{};
      removedChoices=p.removedChoices||{};
      renamedChoices=p.renamedChoices||{};
      // Sync DEF arrays from customizations
      if(p.defForm)DEF_FORM=p.defForm;
      if(p.defMaster)DEF_MASTER=p.defMaster;
      // Forcer lect et math sans chips
      delete customChoices['lect'];
      delete customChoices['math'];
      // Supprimer le chip yxcv partout où il traîne
      for(const tid in customChoices){
        customChoices[tid]=customChoices[tid].filter(c=>c!=='yxcv');
      }
      // Supprimer les tâches coranique si encore présentes
      removedTasks.add('cor');removedTasks.add('cor1');removedTasks.add('cor2');
    }
  }catch(e){}
}
function saveCustomizations(){
  try{localStorage.setItem('plnr_customizations',JSON.stringify({
    taskNames,extraTasks,removedTasks:[...removedTasks],customChoices,removedChoices,renamedChoices,
    defForm:DEF_FORM,defMaster:DEF_MASTER
  }));}catch(e){}
}
loadCustomizations();

function getTaskLbl(tid){return taskNames[tid]||null;}
function setTaskLbl(tid,newLbl){
  const old=getEffectiveTaskLbl(tid);
  taskNames[tid]=newLbl;
  // Sync special tasks sharing old name
  [...BASE_TASKS,...SPECIAL_TASKS,...extraTasks].forEach(t=>{
    if(t.id!==tid&&getEffectiveTaskLbl(t.id)===old)taskNames[t.id]=newLbl;
  });
  saveCustomizations();render();
}
function getEffectiveTaskLbl(tid){
  return taskNames[tid]||([...BASE_TASKS,...SPECIAL_TASKS,...extraTasks].find(t=>t.id===tid)||{}).lbl||tid;
}

function taskDefs(di){
  const t=BASE_TASKS
    .filter(t=>!removedTasks.has(t.id))
    .map(t=>({...t, lbl:getEffectiveTaskLbl(t.id), defCh:getEffectiveChoices(t.id,t.defCh)}));
  // Apply special tasks
  SPECIAL_TASKS.filter(st=>!removedTasks.has(st.id)&&st.days.includes(di)).forEach(st=>{
    t.push({...st, lbl:getEffectiveTaskLbl(st.id)});
  });
  // Add user extra tasks
  extraTasks.filter(et=>!removedTasks.has(et.id)).forEach(et=>{
    t.push({...et, lbl:getEffectiveTaskLbl(et.id), defCh:getEffectiveChoices(et.id,et.defCh||[])});
  });
  return t;
}

// Get effective choices for a task (with custom adds/removes/renames)
function getEffectiveChoices(tid, baseCh){
  const base=(baseCh||[]).map(ch=>{
    const rn=renamedChoices[tid];
    return (rn&&rn[ch])||ch;
  }).filter(ch=>!(removedChoices[tid]||[]).includes(ch)&&!(removedChoices[tid]||[]).includes(
    Object.keys((renamedChoices[tid]||{})).find(k=>(renamedChoices[tid]||{})[k]===ch)||null
  ));
  const extra=(customChoices[tid]||[]).filter(ch=>!(removedChoices[tid]||[]).includes(ch));
  // deduplicate
  return [...new Set([...base,...extra])];
}

function weekId(){
  const d=new Date(),thu=new Date(d);
  thu.setDate(d.getDate()+4-(d.getDay()||7));
  const y0=new Date(thu.getFullYear(),0,1);
  const w=Math.ceil(((thu-y0)/864e5+1)/7);
  return`plnr_${thu.getFullYear()}_W${String(w).padStart(2,'0')}`;
}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1;}

const WK=weekId();
let data={},custom={},expanded={},settings={},editDur={};
let selDay=todayIdx();
const TOD=todayIdx();
const ivs={},tick={};

(function load(){
  try{const s=localStorage.getItem(WK);if(s){const p=JSON.parse(s);data=p.d||{};custom=p.c||{};}}catch(e){}
  try{const s=localStorage.getItem('plnr_settings');if(s)settings=JSON.parse(s);}catch(e){}
  for(let di=0;di<7;di++){
    const d=data[di]||{};
    for(const tid in d){
      if(d[tid]&&d[tid].timerRunning)d[tid].timerRunning=false;
      for(const ch in(d[tid]&&d[tid].choices||{}))if(d[tid].choices[ch]&&d[tid].choices[ch].timerRunning)d[tid].choices[ch].timerRunning=false;
    }
  }
  save();
})();

function save(){try{localStorage.setItem(WK,JSON.stringify({d:data,c:custom}));}catch(e){}}
function saveSettings(){try{localStorage.setItem('plnr_settings',JSON.stringify(settings));}catch(e){}}
function dd(i){if(!data[i])data[i]={};return data[i];}
function trec(di,tid){const d=dd(di);if(!d[tid])d[tid]={};return d[tid];}
function crec(di,tid,ch){const t=trec(di,tid);if(!t.choices)t.choices={};if(!t.choices[ch])t.choices[ch]={};return t.choices[ch];}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    for(let i=0;i<3;i++){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      const t0=ctx.currentTime+i*0.45;
      g.gain.setValueAtTime(0.4,t0);g.gain.exponentialRampToValueAtTime(0.01,t0+0.38);
      o.start(t0);o.stop(t0+0.38);
    }
  }catch(e){}
}

function tkey(tid,ch){return ch?`${tid}:${ch}`:tid;}
function fmt(sec){
  const s=Math.floor(Math.max(0,sec)),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  if(h>0)return`${h}:${pad(m)}:${pad(ss)}`;return`${m}:${pad(ss)}`;
}
function pad(n){return String(n).padStart(2,'0');}
function fmtHM(ts){if(!ts)return'–';const d=new Date(ts);return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

function startTimer(di,tid,ch,dur){
  const k=tkey(tid,ch);if(ivs[k])return;
  const rec=ch?crec(di,tid,ch):trec(di,tid);
  const now=Date.now(),base=rec.elapsed||0;
  rec.timerRunning=true;if(!rec.startTime)rec.startTime=new Date(now).toISOString();
  rec.lastStart=now;tick[k]={lastStart:now,base};save();
  ivs[k]=setInterval(()=>{
    const el=tick[k].base+(Date.now()-tick[k].lastStart)/1000;
    const r2=ch?crec(di,tid,ch):trec(di,tid);r2.elapsed=el;
    if(el>=dur){stopTimer(di,tid,ch,true);beep();return;}
    inlineUpdateTimer(tid,ch,el,dur,C[r2.col||'blue'].mid||'#888');
  },1000);
  render();
}

function stopTimer(di,tid,ch,auto_){
  const k=tkey(tid,ch);
  if(ivs[k]){clearInterval(ivs[k]);delete ivs[k];}delete tick[k];
  if(ch){
    const rec=crec(di,tid,ch);
    if(rec.lastStart)rec.elapsed=(rec.elapsed||0)+(Date.now()-rec.lastStart)/1000;
    rec.timerRunning=false;
    if(auto_){rec.done=true;if(!rec.endTime)rec.endTime=new Date().toISOString();}
    const t=trec(di,tid);
    const allChoices=Object.values(t.choices||{});
    const chips=getCh(tid);
    t.done=chips.length>0&&chips.every(ch=>t.choices&&t.choices[ch]&&t.choices[ch].done);
  }else{
    const rec=trec(di,tid);
    if(rec.lastStart)rec.elapsed=(rec.elapsed||0)+(Date.now()-rec.lastStart)/1000;
    rec.timerRunning=false;
    if(auto_){rec.done=true;if(!rec.endTime)rec.endTime=new Date().toISOString();}
  }
  save();render();
}

function inlineUpdateTimer(tid,ch,el,dur,color){
  const eid='tel-'+(ch?tid+'__'+ch.replace(/\s+/g,'_'):tid);
  const el2=document.getElementById(eid);if(!el2)return;
  const pct=Math.min(100,el/dur*100);
  el2.innerHTML=`<span class="telapsed">${fmt(el)}</span><span class="ttotal">/ ${fmt(dur)}</span>
  <div class="tminibar" style="margin-top:5px"><div class="tminibar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
  <div class="tremain">Reste : ${fmt(Math.max(0,dur-el))}</div>`;
}

function pctDay(i){
  const ts=taskDefs(i),d=data[i]||{};
  return Math.round(ts.filter(t=>d[t.id]&&d[t.id].done).length/ts.length*100);
}
function mathN(){return DAYS.reduce((n,_,i)=>n+(data[i]&&data[i].math&&data[i].math.done?1:0),0);}
function angDone(){
  const done=new Set();
  DAYS.forEach((_,i)=>Object.entries((data[i]&&data[i].ang&&data[i].ang.choices)||{}).forEach(([k,v])=>v&&v.done&&done.add(k)));
  return done;
}
function formDone(){
  const s=new Set();
  DAYS.forEach((_,i)=>Object.entries((data[i]&&data[i].form&&data[i].form.choices)||{}).forEach(([k,v])=>v&&v.done&&s.add(k)));
  return s;
}
function masterDone(){
  const s=new Set();
  DAYS.forEach((_,i)=>Object.entries((data[i]&&data[i].m1&&data[i].m1.choices)||{}).forEach(([k,v])=>v&&v.done&&s.add(k)));
  return s;
}

// ── TODO LIST ─────────────────────────────────────────────────────────
let todoData={};
let currentTodoTid=null;
let editingTodoId=null;

function getTodoItems(tid){return todoData[tid]||[];}

function openTodo(tid,lbl){
  currentTodoTid=tid; editingTodoId=null;
  document.getElementById('todo-sheet-title').textContent=lbl;
  document.getElementById('todo-add-inp').value='';
  renderTodoModal();
  document.getElementById('todo-modal').classList.add('show');
  setTimeout(()=>document.getElementById('todo-add-inp').focus(),300);
}
function closeTodo(){document.getElementById('todo-modal').classList.remove('show');currentTodoTid=null;editingTodoId=null;}

function renderTodoModal(){
  const tid=currentTodoTid;if(!tid)return;
  const items=getTodoItems(tid);

  // Auto-update section done state based on children
  items.forEach(item=>{
    if(item.isSection){
      const children=items.filter(i=>i.parent===item.id);
      if(children.length>0) item.done=children.every(i=>i.done);
    }
  });

  const leafItems=items.filter(i=>!i.isSection);
  const done=leafItems.filter(i=>i.done).length;
  const total=leafItems.length;
  const pct=total>0?Math.round(done/total*100):0;
  const pw=document.getElementById('todo-progress-wrap');
  if(total>0){
    pw.style.display='';
    document.getElementById('todo-progress-fill').style.width=pct+'%';
    document.getElementById('todo-progress-lbl-l').textContent=`${done} / ${total} terminé${done>1?'s':''}`;
    document.getElementById('todo-progress-lbl-r').textContent=pct+'%';
  }else{pw.style.display='none';}

  const list=document.getElementById('todo-list');
  if(items.length===0){
    list.innerHTML=`<div style="text-align:center;padding:32px 16px;color:var(--text2);font-size:13px">
      <div style="font-size:28px;margin-bottom:10px">☑️</div>Aucun élément — ajoutes-en un ci-dessous !
    </div>`;return;
  }

  list.innerHTML=items.map(item=>{
    const isEditing=editingTodoId===item.id;
    const isSec=item.isSection;
    const children=isSec?items.filter(i=>i.parent===item.id):[];
    const allChildDone=isSec&&children.length>0&&children.every(i=>i.done);
    const someChildDone=isSec&&children.some(i=>i.done);

    // Section header style
    if(isSec){
      const secPct=children.length>0?Math.round(children.filter(i=>i.done).length/children.length*100):0;
      return`<div style="margin-top:14px;margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 4px 6px">
          <div class="todo-cb${allChildDone?' checked':someChildDone?'':''}"
            style="${allChildDone?'':'someChildDone?\"background:rgba(124,106,255,0.3);border-color:var(--accent)\":\"\"'};${!allChildDone&&children.length>0?'cursor:default;opacity:0.7':''}"
            title="${allChildDone?'Section complète':'Coche tous les éléments pour valider'}"
            onclick="${allChildDone?`todoToggleSection('${tid}','${item.id}')`:''}"
          >${allChildDone?'✓':someChildDone?'…':''}</div>
          ${isEditing
            ?`<input class="todo-add-inp" id="todo-edit-${item.id}" value="${item.text.replace(/📌\s*/g,'').replace(/"/g,'&quot;')}" style="flex:1;font-size:13px;font-weight:700;padding:4px 10px" onkeydown="if(event.key==='Enter')todoSaveEdit('${tid}','${item.id}');if(event.key==='Escape'){editingTodoId=null;renderTodoModal();}" onclick="event.stopPropagation()">`
            :`<span style="flex:1;font-size:13px;font-weight:700;color:${allChildDone?'var(--text2)':'var(--accent2)'};${allChildDone?'text-decoration:line-through;opacity:0.6':''}">${item.text} <span style="font-size:10px;font-weight:400;color:var(--text2);margin-left:4px">${secPct}%</span></span>`
          }
          <div class="todo-item-actions">
            ${isEditing
              ?`<button class="todo-edit-btn" onclick="todoSaveEdit('${tid}','${item.id}')" style="color:var(--accent2);border-color:var(--accent)">✓</button>`
              :`<button class="todo-edit-btn" onclick="todoStartEdit('${tid}','${item.id}')">✏️</button>`
            }
            <button class="todo-del-btn" onclick="todoDel('${tid}','${item.id}')">🗑</button>
          </div>
        </div>
        <div style="height:1px;background:var(--border2);margin:0 4px 4px"></div>
      </div>`;
    }

    // Child item (indented)
    const isChild=!!item.parent;
    return`<div class="todo-item" style="${isChild?'padding-left:28px':''}">
      <div class="todo-cb${item.done?' checked':''}" onclick="todoToggle('${tid}','${item.id}')">${item.done?'✓':''}</div>
      ${isEditing
        ?`<input class="todo-add-inp" id="todo-edit-${item.id}" value="${item.text.replace(/"/g,'&quot;')}" style="flex:1;font-size:13px;padding:6px 10px" onkeydown="if(event.key==='Enter')todoSaveEdit('${tid}','${item.id}');if(event.key==='Escape'){editingTodoId=null;renderTodoModal();}" onclick="event.stopPropagation()">`
        :`<span class="todo-cb-lbl${item.done?' done':''}" onclick="todoToggle('${tid}','${item.id}')">${item.text}</span>`
      }
      <div class="todo-item-actions">
        ${isEditing
          ?`<button class="todo-edit-btn" onclick="todoSaveEdit('${tid}','${item.id}')" style="color:var(--accent2);border-color:var(--accent)">✓</button>`
          :`<button class="todo-edit-btn" onclick="todoStartEdit('${tid}','${item.id}')">✏️</button>`
        }
        <button class="todo-del-btn" onclick="todoDel('${tid}','${item.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  if(editingTodoId){setTimeout(()=>{const el=document.getElementById('todo-edit-'+editingTodoId);if(el){el.focus();el.select();}},50);}
}

function todoAdd(){
  const tid=currentTodoTid;if(!tid)return;
  const inp=document.getElementById('todo-add-inp');
  const text=inp.value.trim();if(!text)return;
  if(!todoData[tid])todoData[tid]=[];
  // Préfixe "##" pour créer une section : "## Mon titre"
  const isSection=text.startsWith('##');
  const cleanText=isSection?'📌 '+text.slice(2).trim():text;
  todoData[tid].push({id:'td_'+Date.now(),text:cleanText,done:false,isSection:isSection||undefined});
  inp.value='';saveTodo();renderTodoModal();render();inp.focus();
}
function todoToggle(tid,id){
  const items=todoData[tid]||[];
  const item=items.find(i=>i.id===id);if(!item)return;
  if(item.isSection){
    // Section : toggle all children
    const newState=!item.done;
    items.filter(i=>i.parent===id).forEach(i=>i.done=newState);
    item.done=newState;
  } else {
    item.done=!item.done;
    // Auto-update parent section
    if(item.parent){
      const sec=items.find(i=>i.id===item.parent);
      if(sec){const children=items.filter(i=>i.parent===sec.id);sec.done=children.every(i=>i.done);}
    }
  }
  saveTodo();renderTodoModal();render();
}
function todoToggleSection(tid,secId){todoToggle(tid,secId);}
function todoStartEdit(tid,id){editingTodoId=id;renderTodoModal();}
function todoSaveEdit(tid,id){
  const inp=document.getElementById('todo-edit-'+id);if(!inp)return;
  const text=inp.value.trim();
  if(text){const item=(todoData[tid]||[]).find(i=>i.id===id);if(item)item.text=text;saveTodo();}
  editingTodoId=null;renderTodoModal();render();
}
function todoDel(tid,id){
  if(!todoData[tid])return;
  todoData[tid]=todoData[tid].filter(i=>i.id!==id);
  saveTodo();renderTodoModal();render();
}

  </div>`;

      <div>

  if(isTracked('form')&&!removedTasks.has('form')){

  if(isTracked('m1')&&!removedTasks.has('m1')){

  document.getElementById('weekly-tracker').innerHTML=html||`<div style="text-align:center;padding:32px 16px;color:var(--text2);font-size:13px">

  </div>`;

function renderDayNav(){

function getMotivTitle(){
  const quotes=[
    "Chaque heure investie aujourd'hui rapproche de l'ISSEA 🎯",
    "La discipline d'aujourd'hui forge le succès de demain 🔥",
    "Un pas chaque jour, une victoire chaque semaine 💪",
    "Travaille en silence, laisse les résultats parler 📈",
    "Tu ne regretteras jamais d'avoir bossé · jamais 🏆",
    "L'ISSEA ne se prépare pas en une nuit · commence maintenant ⚡",
    "Chaque tâche cochée est une promesse tenue 🎓",

}

function renderTasks(){
  const tasks=taskDefs(selDay),dData=data[selDay]||{};
  const doneN=tasks.filter(t=>dData[t.id]&&dData[t.id].done).length;
  const p=Math.round(doneN/tasks.length*100);
  const dayLabel=DAYS[selDay]+(selDay===TOD?" · Aujourd'hui":'');
  document.getElementById('dtitle').textContent=dayLabel;
  document.getElementById('dpct').textContent=`${doneN}/${tasks.length} · ${p}%`;
  const pf=document.getElementById('pfill');
  pf.style.width=p+'%';
  pf.style.background=p===100?C.green.mid:C.blue.mid;
  document.getElementById('motiv-title').textContent=getMotivTitle();
  document.getElementById('tasklist').innerHTML=tasks.map(renderCard).join('')
    +`<button onclick="openAddTaskModal()" style="width:100%;margin-top:4px;padding:14px;border-radius:var(--radius);border:1.5px dashed var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">+ Ajouter une section</button>`;
}

function renderCard(task){
  const c=C[task.col];
  const rec=(data[selDay]&&data[selDay][task.id])||{};
  const done=!!rec.done;
  const k=tkey(task.id,null),running=!!ivs[k];
  const dur=getDur(task.id);
  const elapsed=rec.elapsed||0;
  const durMin=Math.round(dur/60);
  const durLbl=dur>=3600?`${(dur/3600).toFixed(dur%3600===0?0:1)}h`:`${durMin} min`;
  const cardBorder=done?`border-color:${c.bd};background:${c.bg}`:'';
  const chkSty=done?`border-color:${c.mid};background:${c.mid};color:var(--bg)`:
                (!done&&!running&&elapsed===0)?'opacity:0.4;cursor:not-allowed':'';
  const nameSty=done&&!task.type?'style="text-decoration:line-through;opacity:.5"':(done?`style="color:${c.txt}"`:'');
  const pct=Math.min(100,elapsed/dur*100);
  const eid='tel-'+task.id;
  const isEditDur=!!editDur[task.id];

  // Icons intégrés dans le header — plus de barre séparée
  // Bouton supprimer pour TOUTES les tâches (y compris de base)
  const todoItems=getTodoItems(task.id);
  const todoLeafs=todoItems.filter(t=>!t.isSection);
  const todoDone=todoLeafs.filter(t=>t.done).length;
  const todoTotal=todoLeafs.length;
  const todoHasItems=todoItems.length>0;
  const todoPct=todoTotal>0?Math.round(todoDone/todoTotal*100):0;
  const todoActive=todoItems.length>0;

  const tracked=isTracked(task.id);
  const cardActions=`<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
    <span class="tbadge" style="background:${c.bg};color:${c.txt};border:1px solid ${c.bd}">${durLbl}</span>
    <div style="display:flex;gap:4px;margin-top:2px" onclick="event.stopPropagation()">
      <button title="${tracked?'Désactiver le suivi':'Activer le suivi'}" onclick="toggleTracking('${task.id}')" style="width:28px;height:28px;border-radius:8px;border:1px solid ${tracked?'var(--accent)':'var(--border)'};background:${tracked?'rgba(124,106,255,0.15)':'var(--surface2)'};color:${tracked?'var(--accent2)':'var(--text2)'};font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s">📊</button>
      <button title="Renommer" onclick="renameTask('${task.id}')" style="width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">✏️</button>
      <button title="Modifier la durée" onclick="editDur['${task.id}']=!editDur['${task.id}'];render()" style="width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:${isEditDur?'rgba(124,106,255,0.18)':'var(--surface2)'};color:${isEditDur?'var(--accent2)':'var(--text2)'};font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s">⏱</button>
      <button title="Supprimer cette tâche" onclick="removeTaskConfirm('${task.id}')" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(248,113,113,0.25);background:rgba(248,113,113,0.07);color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(248,113,113,0.18)'" onmouseout="this.style.background='rgba(248,113,113,0.07)'">🗑</button>
    </div>
  </div>`;

  // Barre de progression todo (uniquement si items existent)
  const todoBar=todoHasItems?`<div class="card-todo-bar">
    <div class="card-todo-bar-top">
      <span class="card-todo-bar-lbl">☑️ Todo · ${todoDone}/${todoTotal}</span>
      <span class="card-todo-bar-pct">${todoPct}%</span>
    </div>
    <div class="card-todo-track">
      <div class="card-todo-fill" style="width:${todoPct}%"></div>
    </div>
  </div>`:'';

  const durEditor=isEditDur?`<div style="display:flex;align-items:center;gap:8px;padding:4px 16px 12px 16px" onclick="event.stopPropagation()">
    <span style="font-size:11px;color:var(--text2)">Durée (min) :</span>
    <input type="number" id="dur-inp-${task.id}" value="${durMin}" min="1" max="480" style="width:64px;font-size:12px;padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;font-family:'Sora',sans-serif" onclick="event.stopPropagation()">
    <button onclick="event.stopPropagation();saveDur('${task.id}')" style="font-size:12px;padding:6px 14px;border-radius:99px;border:none;background:var(--accent);color:#fff;font-weight:600">OK</button>
    <button onclick="event.stopPropagation();editDur['${task.id}']=false;render()" style="font-size:12px;padding:6px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text2)">✕</button>
  </div>`:'';

  let timerHtml='';
  const hasChips=getCh(task.id).length>0;
  if(!hasChips){
    // Lock message when task not yet started
    const lockMsg=(!running&&!done&&elapsed===0)?
      `<div class="task-locked-msg">🔒 Lance le minuteur pour pouvoir valider cette tâche</div>`:'';
    timerHtml=`<div class="tsec">
      ${lockMsg}
      <div id="${eid}">${elapsed>0||running?`
        <span class="telapsed">${fmt(elapsed)}</span><span class="ttotal">/ ${fmt(dur)}</span>

        ${!running&&!done&&elapsed===0?`<button class="btn-go" onclick="startTimer(${selDay},'${task.id}',null,${dur})"><span class="rdot" style="background:${c.mid}"></span>▶</button>`:''}

        ${running?`<button class="btn-stop" onclick="stopTimer(${selDay},'${task.id}',null,false)">⏹</button><button class="btn-stop" onclick="event.stopPropagation();resetTask('${task.id}',event)" title="Recommencer">🔄</button>`:''}
        ${done?`<button class="btn-stop" onclick="event.stopPropagation();resetTask('${task.id}',event)" title="Recommencer">🔄</button>`:''}

      ${rec.startTime?`<div class="tts">Début : ${fmtHM(rec.startTime)}${rec.endTime?' · Fin : '+fmtHM(rec.endTime):' · En cours...'}</div>`:''}
    </div>`;
  }

  // ── CHOICES / ADD-ROW (toutes les tâches) ─────────────────────────
  let choicesHtml='';
  {
    const choices=getCh(task.id);
    const exp=expanded[task.id];
    const mgOpen=manageChoicesOpen[task.id];

    // Chips (seulement si la tâche est multi OU a déjà des chips custom)
    let chipsHtml='';

      chipsHtml=choices.map(ch=>{
        const cr=(rec.choices&&rec.choices[ch])||{};

        const subDur=getDur(task.id);
        const chipSty=cDone?`background:${c.mid};color:var(--bg);border-color:${c.mid}`:
                      isExp?`background:${c.bg};border-color:${c.mid};color:${c.txt}`:'';

          ${cRunning?`<span class="chip-timer rdot" style="background:${c.mid};margin:0"></span><span class="chip-timer">${fmt(cEl)}</span>`:''}
          ${cDone&&cr.elapsed?`<span class="chip-timer">${fmt(cr.elapsed)}</span>`:''}
        </div>`;
      }).join('');
    }

    // Sub-timer pour le chip sélectionné
    let subTimerHtml='';
    if(exp&&(task.type||choices.length>0)){
      const cr=(rec.choices&&rec.choices[exp])||{};
      const cDone=cr.done,cRunning=!!ivs[tkey(task.id,exp)];
      const cEl=cr.elapsed||0;
      const subDur=getDur(task.id);
      const cPct=Math.min(100,cEl/subDur*100);
      const cEid='tel-'+task.id+'__'+exp.replace(/\s+/g,'_');
      if(!cDone){
        const lockSubMsg=(!cRunning&&cEl===0)?
          `<div class="task-locked-msg">🔒 Lance le minuteur pour valider « ${exp} »</div>`:'';

          <div class="stlbl">${exp} ${cRunning?'<span class="rdot"></span>':''}</div>
          ${lockSubMsg}
          <div id="${cEid}">${cEl>0||cRunning?`
            <span class="telapsed" style="font-size:18px">${fmt(cEl)}</span><span class="ttotal">/ ${fmt(subDur)}</span>
            <div class="tminibar" style="margin-top:5px"><div class="tminibar-fill" style="width:${cPct.toFixed(1)}%;background:${c.mid}"></div></div>

          </div>
          <div class="tbtns" style="margin-top:8px" onclick="event.stopPropagation()">
            ${!cRunning&&cEl===0?`<button class="btn-go" onclick="startTimer(${selDay},'${task.id}','${exp}',${subDur})"><span class="rdot" style="background:${c.mid}"></span>▶</button>`:''}
            ${!cRunning&&cEl>0?`<button class="btn-go resume" onclick="startTimer(${selDay},'${task.id}','${exp}',${subDur})">↩</button><button class="btn-stop" onclick="undoChoice('${task.id}','${exp}')" title="Recommencer">🔄</button>`:''}
            ${cRunning?`<button class="btn-stop" onclick="stopTimer(${selDay},'${task.id}','${exp}',false)">⏹</button><button class="btn-stop" onclick="undoChoice('${task.id}','${exp}')" title="Recommencer">🔄</button>`:''}
          </div>
          ${cr.startTime?`<div class="tts">Début : ${fmtHM(cr.startTime)}${cr.endTime?' · Fin : '+fmtHM(cr.endTime):' · En cours...'}</div>`:''}
        </div>`;
      }else{
        subTimerHtml=`<div class="subtimer" style="background:${c.bg};border-color:${c.bd}">
          <div class="stlbl" style="color:${c.txt}">✓ ${exp} · ${fmt(cr.elapsed||0)}</div>
          <div class="tts" style="color:${c.txt}">Début : ${fmtHM(cr.startTime)} · Fin : ${fmtHM(cr.endTime)}</div>
          <div class="tbtns" style="margin-top:6px" onclick="event.stopPropagation()">
            <button class="btn-stop" onclick="undoChoice('${task.id}','${exp}')">↩ Annuler</button>
          </div>
        </div>`;
      }
    }

    // Panneau de gestion (⚙)
    const mgPanel=mgOpen&&choices.length>0?`<div class="manage-panel">
      <div class="manage-panel-title">Gérer les options</div>
      ${choices.map(ch=>`<div class="chip-edit-row">
        <span class="chip-edit-lbl">${ch}</span>
        <button class="chip-ren-btn" onclick="event.stopPropagation();renameChoice('${task.id}','${ch}')">✏️</button>
        <button class="chip-del-btn" onclick="event.stopPropagation();removeChoice('${task.id}','${ch}')">✕</button>
      </div>`).join('')}
    </div>`:mgOpen&&choices.length===0?`<div class="manage-panel"><div style="font-size:12px;color:var(--text2);text-align:center;padding:8px">Ajoute d'abord des options ci-dessous</div></div>`:'';

    choicesHtml=`<div class="choices-wrap" onclick="event.stopPropagation()">
      ${chipsHtml?`<div class="chips">${chipsHtml}</div>`:''}
      ${subTimerHtml}
      ${mgPanel}
      <div class="add-row">
        <input class="add-inp" id="ai-${task.id}" placeholder="Ajouter une option..." onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')addCh('${task.id}')">
        <button class="btn-add" onclick="addCh('${task.id}')">+ Ajouter</button>
        <button class="btn-add" onclick="toggleManageChoices('${task.id}')" style="background:${mgOpen?'rgba(124,106,255,0.15)':'var(--surface2)'};border-color:${mgOpen?'var(--accent)':'var(--border)'}">⚙</button>
        <button class="btn-add" onclick="openTodo('${task.id}','${task.lbl.replace(/'/g,"\\'")}')" title="Todo list" style="background:${todoActive?'rgba(124,106,255,0.15)':'var(--surface2)'};border-color:${todoActive?'var(--accent)':'var(--border)'};color:${todoActive?'var(--accent2)':'var(--text2)'}">📝</button>
      </div>
    </div>`;
  } // fin du bloc choicesHtml

  return`<div class="tcard" style="${cardBorder}">
    <div class="tmain">
      <div class="tcheck" style="${chkSty}" title="${done?'Tâche terminée':'Lance le minuteur pour valider'}">✓</div>
      <div class="tinfo">
        <div class="tname" ${nameSty}>${task.lbl}</div>
        <div class="tsub">${task.sub}</div>
      </div>
      ${cardActions}
    </div>
    ${durEditor}${timerHtml}${choicesHtml}${todoBar}
  </div>`;
}

let alertsData=null; // null = not loaded yet

function loadAlerts(){
  try{const s=localStorage.getItem('plnr_alerts');if(s)alertsData=JSON.parse(s);}catch(e){}
  if(!alertsData)alertsData={hiddenAuto:[], custom:[]};
}
function saveAlerts(){try{localStorage.setItem('plnr_alerts',JSON.stringify(alertsData));}catch(e){}}

function deleteAlert(idx,isCustom){
  if(isCustom){alertsData.custom.splice(idx,1);}
  else{const al=buildAutoAlerts();if(al[idx])alertsData.hiddenAuto.push(al[idx].key);}
  saveAlerts();renderAlerts();
}
function openEditAlert(idx,isCustom){
  const items=isCustom?alertsData.custom:buildAutoAlerts().filter(a=>!alertsData.hiddenAuto.includes(a.key));
  const cur=isCustom?items[idx].msg:items[idx].msg;
  showModal('Modifier le message','Texte de l\'alerte...',cur,[{
    label:'Enregistrer',cls:'mbtn-ok',action(v){
      if(!v)return;
      if(isCustom){alertsData.custom[idx].msg=v;}
      else{
        // Convert auto to custom
        const a=items[idx];
        alertsData.hiddenAuto.push(a.key);
        alertsData.custom.push({msg:v,col:a.col});
      }
      saveAlerts();renderAlerts();
    }
  }]);
}
function addCustomAlert(){
  showModal('Nouvelle alerte','Message de l\'alerte...','', [{
    label:'Ajouter',cls:'mbtn-ok',action(v){
      if(!v)return;
      alertsData.custom.push({msg:v,col:'blue'});
      saveAlerts();renderAlerts();
    }
  }]);
}

function buildAutoAlerts(){
  const tasks=taskDefs(selDay),dData=data[selDay]||{};
  const doneN=tasks.filter(t=>dData[t.id]&&dData[t.id].done).length;
  const p=Math.round(doneN/tasks.length*100);
  const al=[];
  if(p===100)al.push({key:'day_complete',col:'green',msg:'Journée complète ! Excellent travail 🎉'});
  if(selDay<TOD&&p<100)al.push({key:'day_past',col:'amber',msg:`Journée passée – ${tasks.length-doneN} tâche(s) non effectuée(s)`});
  if(mathN()<3)al.push({key:'math_obj',col:'amber',msg:`Maths ISSEA : encore ${3-mathN()} séance(s) pour l'objectif de la semaine`});
  const fd=formDone();
  if(fd.size<DEF_FORM.length)al.push({key:'form_missing',col:'teal',msg:'Formations manquantes : '+DEF_FORM.filter(f=>!fd.has(f)).join(', ')});
  return al;
}

function renderAlerts(){
  const autoAll=buildAutoAlerts();
  const visible=autoAll.filter(a=>!alertsData.hiddenAuto.includes(a.key));
  const customs=alertsData.custom||[];

  const alertHtml=[
    ...visible.map((a,i)=>{
      const c=C[a.col]||C.blue;
      return`<div class="alert" style="background:${c.bg};border-color:${c.bd};color:${c.txt};position:relative;padding-right:72px">
        ${a.msg}
        <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px">
          <button onclick="openEditAlert(${i},false)" title="Modifier" style="width:24px;height:24px;border-radius:6px;border:1px solid ${c.bd};background:transparent;color:${c.txt};font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">✏️</button>

        </div>
      </div>`;
    }),
    ...customs.map((a,i)=>{
      const c=C[a.col]||C.blue;
      return`<div class="alert" style="background:${c.bg};border-color:${c.bd};color:${c.txt};position:relative;padding-right:72px">
        ${a.msg}
        <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px">
          <button onclick="openEditAlert(${i},true)" title="Modifier" style="width:24px;height:24px;border-radius:6px;border:1px solid ${c.bd};background:transparent;color:${c.txt};font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">✏️</button>
          <button onclick="deleteAlert(${i},true)" title="Supprimer" style="width:24px;height:24px;border-radius:6px;border:1px solid ${c.bd};background:transparent;color:${c.txt};font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
        </div>

  document.getElementById('alertz').innerHTML=alertHtml+

}

// Tasks with built-in wtrack: ang, math, form, m1 (always shown unless removed)
const BUILTIN_TRACKED=['ang','math','form','m1'];
let trackingEnabled={}; // {tid: true/false} — for non-builtin tasks

function loadTracking(){
  try{const s=localStorage.getItem('plnr_tracking');if(s)trackingEnabled=JSON.parse(s);}catch(e){}
}

function isTracked(tid){
  if(BUILTIN_TRACKED.includes(tid)&&!removedTasks.has(tid))return true;
  return !!trackingEnabled[tid];
}
function toggleTracking(tid){
  if(BUILTIN_TRACKED.includes(tid)){
    // For builtin, we can disable if they want
    trackingEnabled[tid]=!isTracked(tid);
  } else {
    trackingEnabled[tid]=!trackingEnabled[tid];
  }
  saveTracking();render();
}
function resetTask(tid,e){
  if(e)e.stopPropagation();
  const k=tkey(tid,null);
  if(ivs[k]){clearInterval(ivs[k]);delete ivs[k];delete tick[k];}
  const choices=getCh(tid);
  choices.forEach(ch=>{const ck=tkey(tid,ch);if(ivs[ck]){clearInterval(ivs[ck]);delete ivs[ck];delete tick[ck];}});
  if(!data[selDay])data[selDay]={};
  data[selDay][tid]={};
  expanded[tid]=null;
  save();render();
}
function toggleExp(tid,ch){expanded[tid]=expanded[tid]===ch?null:ch;render();}
function undoChoice(tid,ch){
  const t=trec(selDay,tid);if(t.choices&&t.choices[ch])t.choices[ch]={};
    const chips=getCh(tid);
    t.done=chips.length>0&&chips.every(ch=>t.choices&&t.choices[ch]&&t.choices[ch].done);
  expanded[tid]=null;save();render();
}
function addCh(tid){
  const inp=document.getElementById('ai-'+tid);if(!inp)return;
  const v=inp.value.trim();if(!v)return;

  // Auto-convertit la tâche en multi si elle est simple
  const allDefs=[...BASE_TASKS,...SPECIAL_TASKS,...extraTasks];
  const taskDef=allDefs.find(t=>t.id===tid);
  if(taskDef&&!taskDef.type){
    taskDef.type='multi';
    if(!taskDef.defCh)taskDef.defCh=[];
    saveCustomizations();
  }

  if(!customChoices[tid])customChoices[tid]=[];
  const already=getCh(tid);
  if(!already.includes(v)){
    customChoices[tid].push(v);
    saveCustomizations();save();render();
  }
  inp.value='';
  // Ré-focus sur l'input après re-render
  setTimeout(()=>{const el=document.getElementById('ai-'+tid);if(el)el.focus();},50);
}

function getCh(tid){
  const def=[...taskDefs(0),...taskDefs(2),...taskDefs(6)].find(t=>t.id===tid);
  const base=def&&def.defCh||[];
  const extra=(customChoices[tid]||[]).filter(c=>!(removedChoices[tid]||[]).includes(c));
  return [...new Set([...base,...extra])];
}

function renameChoice(tid,oldName){
  showModal(`Renommer « ${oldName} »`,'Nouveau nom...',oldName,[{
    label:'Renommer',cls:'mbtn-ok',action(v){
      if(v&&v!==oldName){
        if(!renamedChoices[tid])renamedChoices[tid]={};

        const origKey=Object.keys(renamedChoices[tid]||{}).find(k=>renamedChoices[tid][k]===oldName)||oldName;

          const i=customChoices[tid].indexOf(oldName);
          if(i>=0)customChoices[tid][i]=v;
        }
        saveCustomizations();render();
      }
    }
  }]);
}

  // Also remove from customChoices
  if(customChoices[tid]){customChoices[tid]=customChoices[tid].filter(c=>c!==chName);}
  saveCustomizations();render();
}

function rr(ctx,x,y,w,h,r){
  if(w<=0||h<=0)return;r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawWeekChart(){
  const cv=document.getElementById('ch-week');
  const W=cv.parentElement.clientWidth-28;
  const CHART_H=320;
  cv.width=W*2;cv.height=CHART_H*2;
  cv.style.width=W+'px';cv.style.height=CHART_H+'px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,W,CHART_H);
  const BW=Math.floor((W-50)/7),MH=140,BY=165,SX=36;
  [0,25,50,75,100].forEach(v=>{
    const y=BY-(v/100)*MH;
    ctx.strokeStyle=v===0?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.05)';ctx.lineWidth=v===0?1:.5;
    ctx.beginPath();ctx.moveTo(SX,y);ctx.lineTo(W-4,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='9px Sora,system-ui';ctx.textAlign='right';
    ctx.fillText(v+'%',SX-5,y+3);
  });
  DAYS.forEach((_,i)=>{
    const p=pctDay(i),x=SX+i*BW+3,bh=(p/100)*MH;
    const isTod=i===TOD,isSel=i===selDay,isPast=i<TOD;
    ctx.fillStyle='rgba(255,255,255,0.04)';rr(ctx,x,BY-MH,BW-6,MH,4);ctx.fill();
    if(bh>0){
      ctx.fillStyle=p===100?C.green.mid:isPast&&p<100?'#f87171':C.amber.mid;
      rr(ctx,x,BY-bh,BW-6,bh,4);ctx.fill();
    }
    if(isTod){ctx.fillStyle=C.blue.mid;ctx.fillRect(x,BY+5,BW-6,3);}
    if(isSel){ctx.strokeStyle=C.blue.mid;ctx.lineWidth=1.5;rr(ctx,x,BY-MH,BW-6,MH,4);ctx.stroke();}
    ctx.fillStyle=isTod?C.blue.mid:isSel?'#f0f0f8':'rgba(255,255,255,0.5)';
    ctx.font=`${isTod?'bold ':''  }10px Sora,system-ui`;ctx.textAlign='center';
    ctx.fillText(ABBR[i],x+(BW-6)/2,BY+18);
    if(p>0){
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 9px Sora,system-ui';
      ctx.fillText(p+'%',x+(BW-6)/2,BY-bh-5);
    }
  });
  // Légende : 2 colonnes, 2 lignes, bien espacées, centrées
  const lgd=[[C.green.mid,'Complet'],[C.amber.mid,'En cours'],['#f87171','Manqué'],['rgba(255,255,255,0.18)','Non commencé']];
  const LGD_Y=BY+36;
  const half=Math.floor((W-SX)/2);
  lgd.forEach(([col,lbl],i)=>{
    const col2=i%2, row=Math.floor(i/2);
    const lx=SX+(col2*half)+4;
    const ly=LGD_Y+row*26;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(lx,ly-10,12,12,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.font='11px Sora,system-ui';ctx.textAlign='left';
    ctx.fillText(lbl,lx+18,ly+1);
  });
}

function drawTable(){
  const tasks=taskDefs(0).filter(t=>!['cor','cor1','cor2'].includes(t.id));
  const cols=DAYS.map((_,i)=>`<th class="dcell" style="${i===TOD?'color:'+C.blue.mid+';font-weight:800':''}">${ABBR[i]}${i===TOD?'*':''}</th>`).join('');
  const rows=tasks.map(task=>{
    const c=C[task.col];
    const cells=DAYS.map((_,i)=>{
      const done=data[i]&&data[i][task.id]&&data[i][task.id].done;
      const isPast=i<TOD,missed=isPast&&!done;
      let bg='',txt='',symbol='·';
      if(done){bg=c.bg;txt=c.txt;symbol='✓';}
      else if(missed){bg='rgba(248,113,113,0.15)';txt='#f87171';symbol='✗';}
      return`<td class="dcell"><div class="cdone" style="${bg?`background:${bg};color:${txt}`:''}">${symbol}</div></td>`;
    }).join('');
    return`<tr><td style="white-space:nowrap;font-size:11px"><span class="tdot" style="background:${c.mid}"></span>${task.lbl.split('–')[0].trim()}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('wtbl').innerHTML=`<thead><tr><th>Tâche</th>${cols}</tr></thead><tbody>${rows}</tbody>
  <tfoot><tr><td colspan="${DAYS.length+1}" style="font-size:9px;color:var(--text2);padding-top:8px">✓ fait · ✗ manqué (jour passé) · · à venir · * aujourd'hui</td></tr></tfoot>`;
}

function drawInsights(){
  const tasks=taskDefs(0).filter(t=>!['cor','cor1','cor2'].includes(t.id));
  const missed=[],consistent=[];
  tasks.forEach(task=>{
    const missedDays=[];
    for(let i=0;i<TOD;i++){
      if(!(data[i]&&data[i][task.id]&&data[i][task.id].done))missedDays.push(ABBR[i]);
    }
    const doneCount=DAYS.filter((_,i)=>data[i]&&data[i][task.id]&&data[i][task.id].done).length;
    const missRate=TOD>0?missedDays.length/TOD:0;
    if(missedDays.length>0)missed.push({task,missedDays,missRate,doneCount});
    else if(TOD>0)consistent.push({task,doneCount});
  });
  missed.sort((a,b)=>b.missRate-a.missRate);
  consistent.sort((a,b)=>b.doneCount-a.doneCount);
  const mathDone=DAYS.filter((_,i)=>data[i]&&data[i].math&&data[i].math.done).length;
  const urgentItems=[];
  const daysLeft=7-TOD;
  const mathNeeded=Math.max(0,3-mathDone);
  if(mathNeeded>0&&daysLeft<mathNeeded+1)urgentItems.push(`⚠️ Objectif Maths ISSEA en danger : il te faut encore <b>${mathNeeded} séance(s)</b> en ${daysLeft} jour(s) restant(s) !`);
  const formDoneSet=formDone();
  if(formDoneSet.size<4&&daysLeft<=2)urgentItems.push(`⚠️ Formations : encore ${4-formDoneSet.size} formation(s) à faire en ${daysLeft} jour(s) !`);

  function missCard(item){
    const c=C[item.task.col];
    const pct=Math.round((1-item.missRate)*100);
    const barColor=item.missRate>0.6?'#f87171':item.missRate>0.3?C.amber.mid:C.teal.mid;
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:${c.mid};flex-shrink:0;display:inline-block"></span>
        <span style="font-size:13px;font-weight:600;color:var(--text);flex:1">${item.task.lbl}</span>
        <span style="font-size:10px;font-weight:700;color:var(--red);background:rgba(248,113,113,0.12);padding:3px 9px;border-radius:99px;border:1px solid rgba(248,113,113,0.2)">${item.missedDays.length} manqué(s)</span>
      </div>
      <div style="font-size:11px;color:var(--red);margin-bottom:8px">Manqué le${item.missedDays.length>1?'s':''} : <b>${item.missedDays.join(', ')}</b></div>
      <div style="height:5px;background:var(--surface2);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:99px;transition:width .4s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px">
        <span style="font-size:10px;color:var(--text2)">Taux de réussite</span>
        <span style="font-size:10px;font-weight:700;color:${barColor}">${pct}%</span>
      </div>
    </div>`;
  }

  function strongCard(item){
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:16px">🔥</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${item.task.lbl}</div>
        <div style="font-size:10px;color:${C.green.mid}">${item.doneCount} jour(s) consécutif(s) sans manquer</div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${C.green.txt};background:${C.green.bg};padding:3px 9px;border-radius:99px;border:1px solid ${C.green.bd}">${item.doneCount}/7</span>
    </div>`;
  }

  let html='';
  if(urgentItems.length){
    html+=`<div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);border-radius:var(--radius);padding:14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">🚨 Alertes prioritaires</div>
      ${urgentItems.map(u=>`<div style="font-size:12px;color:var(--red);margin-top:4px">${u}</div>`).join('')}
    </div>`;
  }
  if(TOD===0){
    html+=`<div style="text-align:center;padding:32px;color:var(--text2);font-size:13px">La semaine vient de commencer — tes données apparaîtront ici au fil des jours.</div>`;
  }else{
    if(missed.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Ce que tu as manqué (${missed.length} tâche${missed.length>1?'s':''})</div>`;
      html+=missed.map(missCard).join('');
    }
    if(consistent.length){
      html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:${missed.length?'14px':'0'}">
        <div style="font-size:11px;font-weight:700;color:${C.green.mid};margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Ce que tu assures 💪</div>
        ${consistent.map(strongCard).join('')}
      </div>`;
    }
    if(!missed.length&&!consistent.length){
      html+=`<div style="text-align:center;padding:32px;color:var(--text2);font-size:13px">Aucune donnée pour les jours passés.</div>`;
    }
  }
  document.getElementById('sgrid').innerHTML=html;
}

function drawTaskChart(){
  const cv=document.getElementById('ch-tasks');
  const W=cv.parentElement.clientWidth-28;
  const tasks=taskDefs(0).filter(t=>!['cor','cor1','cor2'].includes(t.id));
  const H=tasks.length*36+30;
  cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,W,H);
  const LW=110,BA=W-LW-48;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='9px Sora,system-ui';ctx.textAlign='right';ctx.fillText('Fait',LW,10);
  ctx.textAlign='left';ctx.fillText('Manqué',LW+8,10);
  tasks.forEach((task,idx)=>{
    const y=idx*36+20,c=C[task.col];
    let doneN=0,missN=0;
    for(let i=0;i<7;i++){
      const done=data[i]&&data[i][task.id]&&data[i][task.id].done;
      if(done)doneN++;else if(i<TOD)missN++;
    }
    const donePct=doneN/7,missPct=missN/7;
    const doneW=donePct*BA,missW=missPct*BA;
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='10px Sora,system-ui';ctx.textAlign='right';
    ctx.fillText(task.lbl.split('–')[0].trim().substring(0,15),LW-4,y+12);
    ctx.fillStyle='rgba(255,255,255,0.05)';rr(ctx,LW,y,BA,18,4);ctx.fill();
    if(doneW>0){ctx.fillStyle=c.mid;rr(ctx,LW,y,doneW,18,4);ctx.fill();}
    if(missW>0&&TOD>0){
      ctx.fillStyle='rgba(248,113,113,0.15)';
      rr(ctx,LW+doneW,y,missW,18,4);ctx.fill();
      ctx.strokeStyle='#f87171';ctx.lineWidth=1;
      rr(ctx,LW+doneW,y,missW,18,4);ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 9px Sora,system-ui';ctx.textAlign='left';
    ctx.fillText(`${doneN}✓`,LW+BA+6,y+12);
    if(missN>0){ctx.fillStyle='#f87171';ctx.fillText(` ${missN}✗`,LW+BA+22,y+12);}
  });
  const ly=tasks.length*36+12;
  ctx.fillStyle=C.amber.mid;rr(ctx,4,ly-8,10,10,2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px Sora,system-ui';ctx.textAlign='left';ctx.fillText('Fait',18,ly);
  ctx.fillStyle='rgba(248,113,113,0.3)';rr(ctx,55,ly-8,10,10,2);ctx.fill();
  ctx.strokeStyle='#f87171';ctx.lineWidth=.5;rr(ctx,55,ly-8,10,10,2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Manqué (passé)',69,ly);
}

render();
setInterval(()=>render(),30000);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      if(reg.waiting)document.getElementById('update-banner').classList.add('show');
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller)
            document.getElementById('update-banner').classList.add('show');
        });
      });
    }).catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload());
  });
}
function doUpdate(){ if(navigator.serviceWorker.controller){navigator.serviceWorker.getRegistration().then(r=>{if(r&&r.waiting)r.waiting.postMessage('skipWaiting');else window.location.reload();});}else window.location.reload(); }
